{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login | VDRL Management System
    </title>

    <link
        rel="stylesheet"
        href="{% static 'core/css/app.css' %}"
    >

</head>

<body class="login-page">

    <div class="login-card">

        <div class="login-logo">
            VDRL
        </div>

        <h1>
            VDRL Management System
        </h1>

        <p class="muted">
            Sign in to manage document submissions,
            reviews and approvals.
        </p>

        {% if form.errors %}

            <div class="alert alert-error">
                Username or password is incorrect.
            </div>

        {% endif %}

        <form method="post">

            {% csrf_token %}

            <div class="form-group">

                <label for="{{ form.username.id_for_label }}">
                    Username
                </label>

                {{ form.username }}

            </div>

            <div class="form-group">

                <label for="{{ form.password.id_for_label }}">
                    Password
                </label>

                {{ form.password }}

            </div>

            {% if next %}

                <input
                    type="hidden"
                    name="next"
                    value="{{ next }}"
                >

            {% endif %}

            <button
                type="submit"
                class="button button-primary button-full"
            >
                Sign In
            </button>

        </form>

    </div>

</body>

</html>
